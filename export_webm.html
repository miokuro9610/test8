<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Export WebM — A Hole Interaction</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: rgb(0, 80, 255);
        overflow: hidden;
      }

      body {
        display: grid;
        place-items: center;
      }

      canvas {
        display: block;
      }

      #rec-indicator {
        position: fixed;
        top: 8px;
        left: 8px;
        z-index: 9999;
        font:
          11px/1.2 system-ui,
          -apple-system,
          sans-serif;
        color: #fff;
        background: rgba(0, 0, 0, 0.55);
        padding: 4px 8px;
        border-radius: 4px;
        letter-spacing: 0.06em;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="rec-indicator" hidden>RECORDING</div>
    <script src="sketch_preview.js"></script>
    <script>
      (function () {
        const DURATION_MS = 10000;
        const FPS = 30;
        const FILE_NAME = "recording.webm";
        const CANVAS_SIZE = 1080;

        function pickMimeType() {
          const candidates = [
            "video/webm;codecs=vp9",
            "video/webm;codecs=vp8",
            "video/webm",
          ];
          for (let i = 0; i < candidates.length; i++) {
            if (MediaRecorder.isTypeSupported(candidates[i])) {
              return candidates[i];
            }
          }
          return "";
        }

        function waitForCanvas(callback) {
          function tick() {
            const el = document.querySelector("canvas");
            if (
              el &&
              el.width === CANVAS_SIZE &&
              el.height === CANVAS_SIZE
            ) {
              callback(el);
              return;
            }
            requestAnimationFrame(tick);
          }
          requestAnimationFrame(tick);
        }

        function startRecording(canvas) {
          const indicator = document.getElementById("rec-indicator");

          if (!window.MediaRecorder) {
            indicator.hidden = false;
            indicator.textContent = "RECORDING (unsupported)";
            return;
          }

          const mimeType = pickMimeType();
          if (!mimeType) {
            indicator.hidden = false;
            indicator.textContent = "RECORDING (no WebM)";
            return;
          }

          const stream = canvas.captureStream(FPS);
          const chunks = [];

          const recorder = new MediaRecorder(stream, {
            mimeType: mimeType,
            videoBitsPerSecond: 12000000,
          });

          recorder.ondataavailable = function (e) {
            if (e.data && e.data.size > 0) {
              chunks.push(e.data);
            }
          };

          recorder.onstop = function () {
            indicator.hidden = true;
            const blob = new Blob(chunks, { type: "video/webm" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = FILE_NAME;
            document.body.appendChild(a);
            a.click();
            a.remove();
            URL.revokeObjectURL(url);
          };

          indicator.hidden = false;
          indicator.textContent = "RECORDING";
          recorder.start(100);

          window.setTimeout(function () {
            if (recorder.state === "recording") {
              recorder.stop();
            }
          }, DURATION_MS);
        }

        window.addEventListener("load", function () {
          waitForCanvas(startRecording);
        });
      })();
    </script>
  </body>
</html>
